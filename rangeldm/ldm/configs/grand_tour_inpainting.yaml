output_dir: null  # Will auto-create outputs/grand_tour_inpainting
train_batch_size: 32
num_epochs: 1000
gradient_accumulation_steps: 1
use_ema: True
learning_rate: 1e-4
lr_warmup_steps: 500
save_images_epochs: 1
ddim: True
ddpm_num_inference_steps: 50
with_vae: True

# Point to your Grand Tour VAE config and checkpoint
vae_config: ../vae/configs/grand_tour.yaml
vae_checkpoint: null  # Set to your trained VAE checkpoint path

block_out_channels: [128, 128, 256, 256]
inpainting: 0.0625  # 6.25% mask rate
upsample: null
all_circonv: True
grand_tour: True  # Flag for Grand Tour dataset
grand_tour_path: null  # Override with absolute path if dataset is not at ../../grand_tour_dataset/data_ros2/anymal_hesai_ros2

# Model config adjusted for 32 beams (Grand Tour uses Hesai XT-32)
model_config: null
  # sample_size: [256, 8]  # Latent size: 1024/4=256, 32/4=8
  # in_channels: 9  # 4 noisy latent + 4 masked_image latent + 1 mask
  # out_channels: 4
  # layers_per_block: 2
  # block_out_channels: [128, 128, 256, 256]
  # down_block_types: ["DownBlock2D", "AttnDownBlock2D", "AttnDownBlock2D", "AttnDownBlock2D"]
  # up_block_types: ["AttnUpBlock2D", "AttnUpBlock2D", "AttnUpBlock2D", "UpBlock2D"]

# Default parameters
model_config_name_or_path: null
resolution: [1024, 32]  # 1024 width, 32 beams (Hesai XT-32)
eval_batch_size: 16
dataloader_num_workers: 8
save_model_epochs: 10
lr_scheduler: cosine
adam_beta1: 0.95
adam_beta2: 0.999
adam_weight_decay: 1e-6
adam_epsilon: 1e-08
ema_inv_gamma: 1.0
ema_power: 0.75
ema_max_decay: 0.9999
push_to_hub: False
hub_token: null
hub_model_id: null
hub_private_repo: False
logger: tensorboard
logging_dir: logs
local_rank: -1
mixed_precision: 'no'
prediction_type: epsilon
ddpm_num_steps: 1000
ddpm_beta_schedule: linear
checkpointing_steps: 500
checkpoints_total_limit: 10
resume_from_checkpoint: null
enable_xformers_memory_efficient_attention: False
snr_gamma: null
