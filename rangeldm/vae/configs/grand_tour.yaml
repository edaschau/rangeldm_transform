model:
  base_learning_rate: 1.0e-4
  target: sgm.models.autoencoder.AutoencodingEngine
  params:
    input_key: jpg
    monitor: val/rec_loss

    loss_config:
      target: sgm.modules.autoencoding.losses.GeneralLPIPSWithDiscriminator
      params:
        disc_start: 5000
        disc_weight: 0.1
        disc_in_channels: 2
        metakernel: True
        regularization_weights:
          kl_loss: 0.0000001
        kitti: False  # Using Grand Tour dataset, not KITTI
        to_range_image:
          target: sgm.data.grand_tour_range_image.point_cloud_to_range_image_GrandTour
          params:
            num_beams: 32  # Hesai sensor beam count
            width: 1024
            grid_sizes: [1, 512, 512]
            pc_range: [-51.2, -51.2, -3., 51.2, 51.2, 1.]
        wo_perceptual: True
        perceptual_weight: 0.0

    regularizer_config:
      target: sgm.modules.autoencoding.regularizers.DiagonalGaussianRegularizer

    encoder_config:
      target: sgm.modules.diffusionmodules.model.Encoder
      params:
        attn_type: none
        double_z: true
        z_channels: 4
        resolution: 256
        in_channels: 2
        out_ch: 2
        ch: 64
        ch_mult: [1, 2, 4]
        num_res_blocks: 2
        attn_resolutions: []
        dropout: 0.01
        act: silu
        circular: True

    decoder_config:
      target: sgm.modules.diffusionmodules.model.Decoder
      params:
        attn_type: none
        double_z: true
        z_channels: 4
        resolution: 256
        in_channels: 2
        out_ch: 2
        ch: 64
        ch_mult: [1, 2, 4]
        num_res_blocks: 2
        attn_resolutions: []
        dropout: 0.0
        act: silu
        circular: True

data:
  target: sgm.data.grand_tour_range_image.GrandTourRangeLoader
  params:
    grand_tour_path: ../grand_tour_dataset/data_ros2/anymal_hesai_ros2
    topic_name: /boxi/hesai/points
    num_beams: 32  # Hesai sensor typically has 32 beams
    batch_size: 16
    num_workers: 8  # Reduced due to ROS2 bag reading overhead


lightning:
  strategy:
    target: pytorch_lightning.strategies.DDPStrategy
    params:
      find_unused_parameters: True

  modelcheckpoint:
    params:
      every_n_train_steps: 100

  callbacks:
    metrics_over_trainsteps_checkpoint:
      params:
        every_n_train_steps: 50

    image_logger:
      target: main.ImageLogger
      params:
        enable_autocast: False
        batch_frequency: 1000
        max_images: 8
        increase_log_steps: True

  trainer:
    devices: 0,
    limit_val_batches: 50
    benchmark: True
    accumulate_grad_batches: 1
    val_check_interval: 50
    max_epochs: 500
